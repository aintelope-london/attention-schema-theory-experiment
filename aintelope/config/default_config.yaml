run:
  outputs_dir: outputs/${now:%Y%m%d%H%M%S}/
  seed: 0                          # @ui int 0 9999
  max_workers: 0                   # @ui int -1 100
  trials: 1                        # @ui int 1 100
  experiment:
    episodes: 1                    # @ui int 1 100000
    steps: 10                      # @ui int 1 10000
    test_mode: False               # @ui bool
    event_columns: [
      Run_id, Trial, Episode, Seed, Step, IsTest,
      Agent_id, Action, Reward, Done, Observation,
      Position, Food_position, Internal_action]
  write_outputs: True              # @ui bool
  analytics:
    run_summary: {}
    learning_improvement:
      episode_fraction: 0.15
      min_improvement_ratio: 1.3
    learning_curve: {}
    loss_curve: {}
    epsilon_curve: {}
    reward_curve: {}
    steps_to_reward: {}
    optimal_efficiency:
      min_efficiency_pct: 0.70
    efficiency_curve: {}
    visitation_heatmap:
      n_windows: 2
    action_distribution:
      n_windows: 2
    roi_turn_distribution:
      n_windows: 2
    roi_food_alignment:
      n_windows: 2

agent_params:
  save_frequency: 50
  custom_model: ""                 # @ui file outputs
  batch_size: 32                   # @ui int 1 100
  replay_buffer_size: 30000        # @ui int 0 30000
  gamma: 0.99                      # @ui float 0.0 1.0
  agents:
    agent_0:
      agent_class: main_agent      # @ui str main_agent,random_agent,sb3_ppo_agent,sb3_a2c_agent
      model: dqn_fc                # @ui str dqn_fc,dqn_cnn,dqn_fc_roi,dqn_cnn_roi,dqn_fc_roi_circle,dqn_cnn_roi_circle
  # SB3 model parameters
  num_conv_layers: 0               # @ui int 0 3
  learning_rate: 0.0003            # @ui float 0.0001 0.01
  ppo_n_steps: 64                  # @ui int 32 8192

env_params:
  env: gridworld-v1                # @ui str gridworld-v1,savanna-safetygrid-v1
  mode: parallel                   # @ui str parallel

  # ── Gridworld env params (env: gridworld-v1) ───────────────────────
  map_size: 10                     # @ui int 3 50
  observation_radius: 5            # @ui int 1 20
  observation_format: boolean_cube # @ui str boolean_cube
  termination: food                # @ui str food,null
  ripening: 4
  objects:
    food:
      count: 1                     # @ui int 0 20
    predator:
      count: 0                     # @ui int 0 10
  actions:
    - forward
    - left
    - right
    - backward

